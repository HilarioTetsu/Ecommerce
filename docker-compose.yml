version: '3.8'

services:

  # ------------------------------------------------------------
  # 1. BASE DE DATOS (PostgreSQL)
  # ------------------------------------------------------------
  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      # No definimos DB aquí porque el script init.sql creará ambas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Esta línea carga tu script SQL al iniciar:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  # ------------------------------------------------------------
  # 2. EUREKA SERVER (Discovery)
  # ------------------------------------------------------------
  discovery-server:
    image: hilariotetsu/ecommerce-eureka:latest # <--- ASEGÚRATE QUE ESTA CARPETA EXISTA Y TENGA EL DOCKERFILE
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    depends_on:
      - postgres-db # Espera a que la DB arranque (opcional pero recomendado)

  # ------------------------------------------------------------
  # 3. PRODUCT SERVICE
  # ------------------------------------------------------------
  product-service:
    image: hilariotetsu/ecommerce-product:latest # <--- CARPETA DE PRODUCTOS
    container_name: product-service
    ports:
      - "8081:8080" # Desde fuera usas 8081, dentro es 8080
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/product_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password123
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
      - postgres-db

  # ------------------------------------------------------------
  # 4. ORDER SERVICE
  # ------------------------------------------------------------
  order-service:
    image: hilariotetsu/ecommerce-orders:latest # <--- CARPETA DE ORDENES
    container_name: order-service
    ports:
      - "8082:8080" # Desde fuera usas 8082, dentro es 8080
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/order_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password123
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
      - postgres-db

    # ------------------------------------------------------------
    # 5. RabbitMQ 
    # ------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-ecommerce
    ports:
      - "5672:5672" # Puerto para que conecten tus apps Java
      - "15672:15672" # Puerto para el Panel de Administración Web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres_data:
