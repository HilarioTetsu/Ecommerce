name: Compilacion y Construccion de Imagenes

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # INICIO DE SESIÓN EN DOCKER HUB
    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 1. EUREKA: Compilar, Construir y Subir
    - name: Procesar Ecommerce-Eureka
      run: |
        cd Ecommerce-Eureka
        chmod +x mvnw
        ./mvnw clean package -DskipTests
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-eureka:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-eureka:latest

    # 2. PRODUCT: Compilar, Construir y Subir
    - name: Procesar Ecommerce-Product
      run: |
        cd Ecommerce-Product
        chmod +x mvnw
        ./mvnw clean package -DskipTests
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-product:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-product:latest

    # 3. ORDERS: Compilar, Construir y Subir
    - name: Procesar Ecommerce-Orders
      run: |
        cd Ecommerce-Orders
        chmod +x mvnw
        ./mvnw clean package -DskipTests
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-orders:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-orders:latest
    
    - name: Procesar Ecommerce-Gateway
      run: |
        cd Ecommerce-Gateway
        chmod +x mvnw
        ./mvnw clean package -DskipTests
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-gateway:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-gateway:latest    